<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>论文预览 - 手机端</title>
    <style>
      :root {
        --bg: #f3efe7;
        --paper: #fffdf8;
        --ink: #1f1d1a;
        --muted: #6a645c;
        --border: rgba(31, 29, 26, 0.12);
        --shadow: 0 24px 60px rgba(24, 23, 20, 0.12);
        --accent: #c9a56a;
      }
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", serif;
        line-height: 1.6;
        color: var(--ink);
        background: linear-gradient(180deg, #efe8db 0%, var(--bg) 100%);
        min-height: 100vh;
      }
      
      .header {
        position: sticky;
        top: 0;
        background: rgba(255, 253, 248, 0.92);
        padding: 16px;
        box-shadow: 0 2px 12px rgba(24, 23, 20, 0.1);
        z-index: 100;
        backdrop-filter: blur(10px);
      }
      
      .header h1 {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 6px;
        color: #18211f;
      }
      
      .header .meta {
        font-size: 13px;
        color: var(--muted);
      }
      
      .refresh-btn {
        position: absolute;
        top: 16px;
        right: 16px;
        padding: 8px 16px;
        background-color: #f1d39c;
        color: #18211f;
        border: none;
        border-radius: 999px;
        font-size: 13px;
        cursor: pointer;
        font-family: inherit;
      }
      
      .content {
        padding: 20px;
      }
      
      .paper {
        max-width: 100%;
        margin: 0 auto;
        padding: 32px 24px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--paper);
        box-shadow: var(--shadow);
        line-height: 1.95;
        font-size: 16px;
      }
      
      .paper h1, .paper h2, .paper h3, .paper h4, .paper h5, .paper h6 {
        margin-top: 24px;
        margin-bottom: 16px;
        font-weight: 600;
        line-height: 1.35;
        color: #18211f;
      }
      
      .paper h1 {
        margin-top: 0;
        padding-bottom: 16px;
        border-bottom: 2px solid rgba(201, 165, 106, 0.4);
        font-size: 24px;
      }
      
      .paper h2 {
        margin-top: 32px;
        font-size: 20px;
      }
      
      .paper h3 {
        margin-top: 24px;
        font-size: 18px;
      }
      
      .paper p {
        margin-bottom: 16px;
        word-break: break-word;
      }
      
      .paper ul, .paper ol {
        margin-bottom: 16px;
        padding-left: 24px;
      }
      
      .paper li {
        margin-bottom: 8px;
        word-break: break-word;
      }
      
      .paper table {
        width: 100%;
        border-collapse: collapse;
        margin: 24px 0;
        font-size: 14px;
        overflow: hidden;
      }
      
      .paper th, .paper td {
        padding: 10px 12px;
        border: 1px solid rgba(31, 29, 26, 0.12);
        text-align: left;
      }
      
      .paper th {
        background: #f4ecdd;
        font-weight: 600;
      }
      
      .paper img {
        max-width: 100%;
        height: auto;
        margin: 16px 0;
      }
      
      .paper .thesis-figure {
        margin: 24px 0 10px;
        padding: 18px;
        border: 1px solid rgba(31, 29, 26, 0.1);
        border-radius: 20px;
        background: #fcfaf5;
      }
      
      .paper blockquote {
        margin: 24px 0;
        padding: 12px 20px;
        border-left: 4px solid var(--accent);
        color: #544d44;
        background: #fbf6ea;
      }
      
      .loading {
        text-align: center;
        padding: 40px 0;
        color: var(--muted);
      }
      
      .error {
        text-align: center;
        padding: 40px 0;
        color: #d73a49;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>论文预览</h1>
      <div class="meta" id="fileName">20260315.md</div>
      <div class="meta" id="updatedAt">最近更新：加载中...</div>
      <button class="refresh-btn" id="refreshButton">刷新</button>
    </div>
    
    <div class="content">
      <article class="paper" id="paper">
        <p class="loading">正在渲染论文内容...</p>
      </article>
    </div>
    
    <script src="marked.min.js"></script>
    <script>
      // 添加调试信息
      console.log('Mobile script started');
      console.log('Mobile marked available:', typeof window.marked);
      
      // 确保marked库加载完成后再执行
      window.addEventListener('load', function() {
        console.log('Mobile window loaded');
        console.log('Mobile marked available after load:', typeof window.marked);
        
        const paper = document.querySelector("#paper");
        const updatedAt = document.querySelector("#updatedAt");
        const refreshButton = document.querySelector("#refreshButton");
        
        async function renderDocument() {
          try {
            console.log('Mobile fetching markdown file...');
            const response = await fetch("../20260315.md", { cache: "no-store" });
            console.log('Mobile fetch response:', response);
            
            if (!response.ok) {
              throw new Error(`文档读取失败: ${response.status}`);
            }
            
            const markdown = await response.text();
            console.log('Mobile markdown loaded, length:', markdown.length);
            
            // 检查marked是否可用
            if (typeof window.marked === 'function') {
              console.log('Mobile using marked to render...');
              const html = window.marked(markdown);
              console.log('Mobile rendered HTML length:', html.length);
              paper.innerHTML = html;
              updatedAt.textContent = `最近更新：${new Date().toLocaleString('zh-CN')}`;
            } else {
              console.error('Mobile marked is not a function:', marked);
              throw new Error('marked库未正确加载');
            }
          } catch (error) {
            console.error('Mobile error:', error);
            paper.innerHTML = `<p class="error">${error.message}</p>`;
          }
        }
        
        refreshButton.addEventListener("click", async () => {
          refreshButton.disabled = true;
          try {
            await renderDocument();
          } finally {
            refreshButton.disabled = false;
          }
        });
        
        // 初始加载
        console.log('Mobile initiating initial render...');
        renderDocument();
      });
    </script>
  </body>
</html>
