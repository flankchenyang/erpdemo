<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">图5-3 跨案例在连续谱上的位置与张力</title>
  <desc id="desc">展示总包转型型企业、中集、Herring Road、Katerra与英国MMC群体在项目逻辑—产品逻辑连续谱上的不同位置及其张力。</desc>
  <defs>
    <style>
      .bg { fill: #f8fbff; }
      .panel { fill: #ffffff; stroke: #d8e2ee; stroke-width: 2; rx: 20; ry: 20; }
      .ink { fill: #1d2a3a; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
      .muted { fill: #5c6b7c; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
      .title { font-size: 30px; font-weight: 700; }
      .h { font-size: 22px; font-weight: 700; }
      .b { font-size: 17px; font-weight: 600; }
      .s { font-size: 15px; }
      .tiny { font-size: 14px; }
      .axis { stroke: #4f7dbc; stroke-width: 6; fill: none; marker-start: url(#left); marker-end: url(#right); }
      .tick { stroke: #8da3ba; stroke-width: 3; }
      .point-main { fill: #c44d58; }
      .point-cimc { fill: #0f66d8; }
      .point-herring { fill: #2f7d4f; }
      .point-katerra { fill: none; stroke: #f1a742; stroke-width: 4; stroke-dasharray: 10 6; }
      .point-uk { fill: #7d5bb6; }
      .guide { stroke: #cfd9e6; stroke-width: 2; stroke-dasharray: 5 6; }
    </style>
    <marker id="left" markerWidth="12" markerHeight="12" refX="4" refY="6" orient="auto">
      <path d="M10,0 L2,6 L10,12 Z" fill="#4f7dbc" />
    </marker>
    <marker id="right" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,0 L10,6 L2,12 Z" fill="#4f7dbc" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760" rx="28" ry="28" />
  <text class="ink title" x="70" y="64">图5-3 跨案例在连续谱上的位置与张力</text>
  <text class="muted s" x="70" y="98">这张图的重点不是给案例贴“成功/失败”标签，而是说明不同企业和项目分别停在连续谱的什么位置，以及为什么停在那里。</text>

  <path class="axis" d="M120 260 H1080" />
  <line class="tick" x1="280" y1="240" x2="280" y2="280" />
  <line class="tick" x1="600" y1="230" x2="600" y2="290" />
  <line class="tick" x1="920" y1="240" x2="920" y2="280" />
  <text class="ink b" x="110" y="320">更强的项目逻辑</text>
  <text class="ink b" x="530" y="320">中间状态 / 有限产品化</text>
  <text class="ink b" x="905" y="320">更成熟的产品逻辑</text>

  <line class="guide" x1="330" y1="260" x2="330" y2="470" />
  <circle class="point-main" cx="330" cy="260" r="12" />
  <rect class="panel" x="170" y="470" width="320" height="128" />
  <text class="ink h" x="198" y="510">总包转型型企业</text>
  <text class="muted s" x="198" y="542">工厂已建，但仍主要服务项目履约</text>
  <text class="muted s" x="198" y="570">窗口期可盈利，平台规则未稳固</text>

  <line class="guide" x1="565" y1="260" x2="565" y2="430" />
  <circle class="point-cimc" cx="565" cy="260" r="12" />
  <rect class="panel" x="430" y="430" width="290" height="128" />
  <text class="ink h" x="458" y="470">中集（CIMC MBS）</text>
  <text class="muted s" x="458" y="502">制造底盘和接口规则更强</text>
  <text class="muted s" x="458" y="530">但上层仍需大量项目适配</text>

  <line class="guide" x1="760" y1="260" x2="760" y2="470" />
  <circle class="point-herring" cx="760" cy="260" r="12" />
  <rect class="panel" x="620" y="470" width="290" height="128" />
  <text class="ink h" x="648" y="510">Herring Road</text>
  <text class="muted s" x="648" y="542">项目层面已形成平台协同</text>
  <text class="muted s" x="648" y="570">本地开发与制造嵌入并行推进</text>

  <line class="guide" x1="520" y1="260" x2="520" y2="150" />
  <circle class="point-katerra" cx="520" cy="260" r="18" />
  <rect class="panel" x="320" y="120" width="400" height="100" />
  <text class="ink h" x="348" y="158">Katerra：高意图不等于高成熟度</text>
  <text class="muted s" x="348" y="190">它试图向右冲，但产品逻辑并未稳定落地，反而被高固定成本和组织失配拖回。</text>

  <line class="guide" x1="650" y1="260" x2="650" y2="640" />
  <circle class="point-uk" cx="650" cy="260" r="10" />
  <rect class="panel" x="430" y="620" width="440" height="90" />
  <text class="ink h" x="458" y="656">英国MMC群体：想往右走，但被市场波动和制度缺口持续拉回</text>
  <text class="muted s" x="458" y="686">这组样本说明成熟市场也不会自动提供产品逻辑所需的稳定管线。</text>

  <text class="muted tiny" x="70" y="730">资料来源：作者根据第五章跨案例比较绘制。</text>
</svg>
