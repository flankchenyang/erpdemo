<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">图5-1 主案例企业业务链与组织关系图</title>
  <desc id="desc">展示主案例企业中业主、项目部、设计院、工厂与现场安装之间的关系，以及前端定义权和后端执行压力的分布。</desc>
  <defs>
    <style>
      .bg { fill: #f8fbff; }
      .card { fill: #ffffff; stroke: #d8e2ee; stroke-width: 2; rx: 18; ry: 18; }
      .panel1 { fill: #eef5ff; }
      .panel2 { fill: #fff7df; }
      .panel3 { fill: #eef8f2; }
      .warn { fill: #fef1ef; stroke: #d77a74; stroke-width: 2.5; rx: 18; ry: 18; }
      .ink { fill: #1d2a3a; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
      .muted { fill: #5c6b7c; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
      .title { font-size: 30px; font-weight: 700; }
      .h { font-size: 22px; font-weight: 700; }
      .b { font-size: 17px; font-weight: 600; }
      .s { font-size: 15px; }
      .tiny { font-size: 14px; }
      .line { stroke: #6b95cf; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #9fb3c9; stroke-width: 3; fill: none; marker-end: url(#arrow2); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6b95cf" />
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9fb3c9" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760" rx="28" ry="28" />
  <text class="ink title" x="70" y="64">图5-1 主案例企业业务链与组织关系图</text>
  <text class="muted s" x="70" y="98">这张图想说明的不是“流程很长”，而是“谁更靠近客户和设计冻结节点，谁就更接近需求定义权”。</text>

  <rect class="card panel1" x="70" y="150" width="250" height="120" />
  <text class="ink h" x="100" y="194">业主 / 建设单位</text>
  <text class="muted s" x="100" y="226">功能需求、投资目标</text>
  <text class="muted s" x="100" y="250">合同节点与验收压力</text>

  <rect class="card panel2" x="390" y="130" width="300" height="160" />
  <text class="ink h" x="420" y="174">总包项目部</text>
  <text class="muted s" x="420" y="206">对外沟通、进度承诺、成本平衡</text>
  <text class="muted s" x="420" y="234">把需求翻译成项目任务</text>
  <text class="muted s" x="420" y="262">优先保证节点履约</text>

  <rect class="card panel2" x="390" y="330" width="300" height="140" />
  <text class="ink h" x="420" y="372">设计院 / 顾问侧</text>
  <text class="muted s" x="420" y="404">方案深化、规范适配、设计冻结</text>
  <text class="muted s" x="420" y="432">决定大量前端界面条件</text>

  <rect class="card panel3" x="780" y="180" width="280" height="180" />
  <text class="ink h" x="810" y="224">惠州 MiC 工厂</text>
  <text class="muted s" x="810" y="256">排产、制造、接口协调</text>
  <text class="muted s" x="810" y="284">吸收临时变更与非标要求</text>
  <text class="muted s" x="810" y="312">需要稳定节拍才能释放效率</text>

  <rect class="card" x="780" y="430" width="280" height="120" />
  <text class="ink h" x="810" y="470">运输 / 吊装 / 现场安装</text>
  <text class="muted s" x="810" y="500">将工厂成果转化为项目交付</text>
  <text class="muted s" x="810" y="528">继续接受项目节点约束</text>

  <path class="line" d="M320 210 H390" />
  <path class="line" d="M690 210 H780" />
  <path class="soft" d="M540 290 V330" />
  <path class="soft" d="M690 400 H780" />
  <path class="soft" d="M920 360 V430" />

  <rect class="warn" x="120" y="600" width="960" height="100" />
  <text class="ink h" x="150" y="642">管理含义</text>
  <text class="muted s" x="250" y="642">项目部和设计院更靠近客户、承诺和设计冻结节点，因此更接近需求定义权；</text>
  <text class="muted s" x="250" y="672">工厂承担制造复杂性和变更吸收压力，却缺乏用平台边界过滤需求、稳定节拍的制度性权力。</text>

  <text class="muted tiny" x="70" y="728">资料来源：作者根据主体案例访谈、内部资料与第五章分析绘制。</text>
</svg>
